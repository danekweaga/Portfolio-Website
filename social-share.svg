<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e0e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="157" x2="1200" y2="157" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="white" stroke-width="1"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-line)"/>

  <!-- Logo / Initials -->
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">NE</text>

  <!-- Name -->
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="white" letter-spacing="-1">Nonso Ekweaga</text>

  <!-- Title -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="24" fill="#a8a29e">Full-Stack, AI &amp; Cloud Developer</text>

  <!-- Divider -->
  <rect x="80" y="250" width="80" height="2" fill="#34d399"/>

  <!-- Description -->
  <text x="80" y="295" font-family="Arial, sans-serif" font-size="20" fill="#78716c">Applied Computer Science student at Dalhousie University</text>

  <!-- Tech stack -->
  <text x="80" y="340" font-family="monospace" font-size="16" fill="#525252">TypeScript · React · Python · PostgreSQL · AWS · Azure</text>

  <!-- Website -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="18" fill="#34d399">nonso.codes</text>

  <!-- Right side decoration -->
  <g opacity="0.06">
    <circle cx="1000" cy="300" r="200" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="1000" cy="300" r="150" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="1000" cy="300" r="100" fill="none" stroke="white" stroke-width="1"/>
  </g>
</svg>
